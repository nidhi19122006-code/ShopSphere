{% extends "base.html" %}

{% block title %}Login - ShopSphere{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="h4 mb-3">Login</h1>
        <form method="post" novalidate>
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <p class="mt-3 mb-0"><a href="{% url 'accounts:password_reset' %}">Forgot your password?</a></p>
    </div>
</div>
{% endblock %}
