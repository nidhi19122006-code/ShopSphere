{% extends "base.html" %}

{% block title %}Reset password - ShopSphere{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="h4 mb-3">Reset your password</h1>
        <p class="text-muted">Enter the email you used to register. We'll send a reset link.</p>
        <form method="post" novalidate>
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Send reset link</button>
        </form>
    </div>
</div>
{% endblock %}
