{% extends "base.html" %}

{% block title %}Add address - ShopSphere{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h1 class="h4 mb-3">Add address</h1>
        <form method="post" novalidate>
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save address</button>
        </form>
    </div>
</div>
{% endblock %}
