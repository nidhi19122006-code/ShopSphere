{% extends "base.html" %}

{% block title %}Sign up - ShopSphere{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="h4 mb-3">Create your account</h1>
        <form method="post" novalidate>
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-brand">Sign up</button>
        </form>
        <p class="mt-3 mb-0">Already have an account? <a href="{% url 'accounts:login' %}">Login</a></p>
    </div>
</div>
{% endblock %}
