{% extends "base.html" %}

{% block title %}Delete product - ShopSphere{% endblock %}

{% block content %}
<div class="section-card">
    <h1 class="h5">Delete product</h1>
    <p class="text-muted">Are you sure you want to delete {{ object.name }}?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a class="btn btn-outline-dark" href="{% url 'sellers:products' %}">Cancel</a>
    </form>
</div>
{% endblock %}
